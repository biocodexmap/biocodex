<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060E09">
<title>BioCodex — Mapa Metabólico Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Core palette — Luxury Bio-Tech Dark */
  --ink:#060E09;
  --deep:#0C1A11;
  --card:#111F16;
  --glass:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.07);
  --vital:#00D68F;
  --vital2:#00B876;
  --pulse:#4DFFC4;
  --gold:#F5C842;
  --gold2:#E8B520;
  --amber:#FF9F43;
  --rose:#FF6B6B;
  --lavender:#A78BFA;
  --sky:#60A5FA;
  --cream:#F8F4EE;
  --tx:#F0F4F1;
  --tx2:#7A9485;
  --tx3:#3D5A47;
  --obs:#060E09;
  --forest:#00B876;
  --mist:rgba(0,214,143,.08);
  --mist2:rgba(0,214,143,.2);
  --alertL:rgba(245,200,66,.08);
  --alert:#F5C842;
  --crit:#FF6B6B;
  --critL:rgba(255,107,107,.1);
  --purpL:rgba(167,139,250,.1);
  --purp:#A78BFA;
  --grl:rgba(255,255,255,.04);
  --bg2:#0E1A13;
  --tx-dark:#060E09;
}

/* ── BODY & LAYOUT ── */
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--ink);
  color:var(--tx);
  min-height:100vh;
  padding:0;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,214,143,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,200,66,.04) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}
.app{max-width:680px;margin:0 auto;padding:0 0 4rem;position:relative;z-index:1}

/* ── HEADER ── */
.hdr{
  padding:2rem 1.5rem 1.6rem;
  position:relative;
  overflow:hidden;
  margin-bottom:.2rem;
}
.hdr::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--vital),transparent);
  opacity:.4;
}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}

/* Logo mark SVG container */
.logo-mark{
  width:48px;height:48px;flex-shrink:0;
  background:linear-gradient(135deg,var(--vital),var(--vital2));
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,214,143,.3),0 0 60px rgba(0,214,143,.1);
}
.logo-text-wrap{flex:1}
.logo-name{
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;
  color:#fff;letter-spacing:-.5px;
  line-height:1;
}
.logo-name span{
  background:linear-gradient(135deg,var(--vital),var(--pulse));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo-tag{
  font-size:9px;color:var(--tx2);
  letter-spacing:3px;font-weight:600;
  text-transform:uppercase;margin-top:4px;
}
.hdr-divider{
  height:1px;
  background:linear-gradient(90deg,var(--vital),transparent);
  opacity:.2;margin:12px 0;
}
.hdr-sub{font-size:12px;color:var(--tx2);font-style:italic;font-family:'Playfair Display',serif;letter-spacing:.3px}
.hdr-sub em{color:var(--vital);font-style:normal;font-weight:600}

/* ── PROGRESS ── */
.prog-wrap{
  margin:0 1rem 1rem;
  padding:1rem 1.2rem;
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--border);
}
.prog-bars{display:flex;gap:5px;margin-bottom:8px}
.prog-bar{
  flex:1;height:3px;border-radius:3px;
  background:rgba(255,255,255,.06);
  transition:all .4s ease;
}
.prog-bar.done{background:var(--vital);box-shadow:0 0 8px rgba(0,214,143,.4)}
.prog-bar.active{background:linear-gradient(90deg,var(--vital),var(--pulse));animation:prog-pulse 1.5s ease-in-out infinite}
@keyframes prog-pulse{0%,100%{opacity:1}50%{opacity:.6}}
.prog-lbl{font-size:11px;color:var(--tx2);letter-spacing:.3px}
.prog-lbl strong{color:var(--vital);font-weight:600}

/* ── CARDS ── */
.card{
  background:var(--card);
  border-radius:20px;
  padding:1.5rem;
  margin:0 1rem 1rem;
  border:1px solid var(--border);
  box-shadow:0 4px 24px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,214,143,.3),transparent);
}

/* ── SECTION HEADERS ── */
.sec-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:12px;
  font-size:13px;font-weight:600;
  margin-bottom:1.4rem;
  border:1px solid;
  letter-spacing:.3px;
}
.h-info{background:rgba(245,200,66,.08);border-color:rgba(245,200,66,.2);color:var(--gold)}
.h-gut{background:rgba(255,159,67,.08);border-color:rgba(255,159,67,.2);color:var(--amber)}
.h-sleep{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.2);color:var(--lavender)}
.h-hor{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.2);color:var(--sky)}
.h-bio{background:rgba(0,214,143,.08);border-color:rgba(0,214,143,.2);color:var(--vital)}
.pill-step{
  background:rgba(0,214,143,.15);
  color:var(--vital);
  font-size:9px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  letter-spacing:1px;white-space:nowrap;
  border:1px solid rgba(0,214,143,.3);
}

/* ── FORM ELEMENTS ── */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:.9rem}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.flbl{font-size:11px;color:var(--tx2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.finput{
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;
  background:rgba(255,255,255,.04);
  color:var(--tx);outline:none;
  transition:all .2s;width:100%;
  -webkit-appearance:none;
}
.finput:focus{
  border-color:var(--vital);
  background:rgba(0,214,143,.05);
  box-shadow:0 0 0 3px rgba(0,214,143,.1);
}
.finput::placeholder{color:var(--tx3)}
.finput option{background:#1a2e22;color:#fff}
.finput-hint{font-size:11px;color:var(--tx3);margin-top:4px;line-height:1.5}

/* ── EDUCATIONAL TIP ── */
.edu-tip{
  background:linear-gradient(135deg,rgba(0,214,143,.06),rgba(0,214,143,.02));
  border-left:2px solid var(--vital);
  border-radius:0 10px 10px 0;
  padding:10px 14px;
  font-size:12px;
  color:rgba(240,244,241,.75);
  line-height:1.7;
  margin-bottom:10px;
}

/* ── QUESTION OPTIONS ── */
.qwrap{margin-bottom:1.4rem}
.qlbl{
  font-size:14px;font-weight:600;
  color:var(--tx);margin-bottom:6px;line-height:1.5;
}
.qsub{font-size:11px;color:var(--tx3);margin-bottom:8px;letter-spacing:.3px}
.opts{display:grid;gap:8px;margin-top:8px}
.opts.c2{grid-template-columns:1fr 1fr}
.opts.c3{grid-template-columns:1fr 1fr 1fr}
.obt{
  display:block;width:100%;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(255,255,255,.03);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;color:rgba(240,244,241,.7);
  cursor:pointer;text-align:center;
  line-height:1.35;
  transition:all .18s ease;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.obt:hover{
  border-color:rgba(0,214,143,.4);
  background:rgba(0,214,143,.06);
  color:var(--tx);
}
.obt.sel{
  border-color:var(--vital)!important;
  background:rgba(0,214,143,.12)!important;
  color:var(--vital)!important;
  font-weight:600;
  box-shadow:0 0 0 1px rgba(0,214,143,.3);
}
.obt.sel::before{content:"✓ ";font-size:11px}
.outra-box{margin-top:10px;display:none}
.outra-box.show{display:block}

/* ── OBJECTIVES GRID ── */
.obj-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.obj-btn{
  padding:9px 14px;
  border:1px solid var(--border);
  border-radius:20px;
  background:rgba(255,255,255,.03);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;font-weight:500;
  color:rgba(240,244,241,.6);
  cursor:pointer;
  transition:all .18s ease;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.obj-btn:hover{border-color:rgba(0,214,143,.4);color:var(--vital);background:rgba(0,214,143,.06)}
.obj-btn.sel{
  border-color:var(--vital);
  background:rgba(0,214,143,.12);
  color:var(--vital);font-weight:700;
}

/* ── NAV BUTTONS ── */
.navbtns{display:flex;gap:10px;margin-top:1.6rem}
.btnback{
  padding:13px 22px;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(255,255,255,.04);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:500;color:var(--tx2);
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.btnback:hover{border-color:var(--vital);color:var(--vital)}
.btnnext{
  flex:1;padding:14px 24px;
  background:linear-gradient(135deg,var(--vital),var(--vital2));
  border:none;border-radius:12px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:700;color:#fff;
  cursor:pointer;transition:all .25s;
  box-shadow:0 4px 20px rgba(0,214,143,.3),0 1px 0 rgba(255,255,255,.1) inset;
  letter-spacing:.3px;
  -webkit-tap-highlight-color:transparent;
}
.btnnext:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,214,143,.4)}
.btnnext:active{transform:translateY(0)}
.btngen{
  width:100%;padding:18px;
  background:linear-gradient(135deg,var(--vital) 0%,var(--vital2) 60%,#00906A 100%);
  border:none;border-radius:16px;
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;color:#fff;
  cursor:pointer;transition:all .3s;
  margin-top:1.4rem;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 6px 32px rgba(0,214,143,.4),0 1px 0 rgba(255,255,255,.15) inset;
  letter-spacing:.3px;
  -webkit-tap-highlight-color:transparent;
}
.btngen:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,214,143,.5)}
.btnreset{
  width:100%;padding:14px;
  background:transparent;
  border:1px solid var(--lavender);
  border-radius:12px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:600;color:var(--lavender);
  cursor:pointer;transition:all .2s;margin-top:.8rem;
  -webkit-tap-highlight-color:transparent;
}
.btnreset:hover{background:rgba(167,139,250,.1)}

/* ── SCORE CARD ── */
.score-wrap{
  background:linear-gradient(135deg,#0A1F14,#0C2618);
  border-radius:20px;padding:1.4rem;margin-bottom:1rem;
  border:1px solid rgba(0,214,143,.15);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
}
.score-wrap::before{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,214,143,.08),transparent 70%);
}
.score-top{display:flex;align-items:center;gap:18px}
.score-circle{
  width:88px;height:88px;
  border-radius:50%;
  background:conic-gradient(var(--vital) 0% calc(var(--pct)*1%),rgba(255,255,255,.06) 0%);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
  box-shadow:0 0 0 4px rgba(0,214,143,.1),0 0 24px rgba(0,214,143,.15);
}
.score-circle::before{
  content:'';position:absolute;
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,#0C1A11,#0A1F14);
}
.score-num{
  position:relative;
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;color:#fff;
}
.score-info{flex:1}
.score-label{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:700;color:#fff;
  margin-bottom:4px;
}
.score-grade{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:700;
  margin-bottom:10px;letter-spacing:.5px;
  border:1px solid;
}
.score-bars{display:flex;flex-direction:column;gap:8px}
.sbar-row{display:flex;align-items:center;gap:10px}
.sbar-lbl{font-size:11px;color:var(--tx2);width:80px;flex-shrink:0;letter-spacing:.3px}
.sbar-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.sbar-fill{height:100%;border-radius:4px;position:relative}
.sbar-fill::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2));
}
.score-explain{
  margin-top:12px;font-size:11px;color:var(--tx2);
  line-height:1.7;border-top:1px solid var(--border);padding-top:12px;
}
.score-explain strong{color:var(--vital)}

/* ── DNA/MANDALA ── */
.dna-wrap{
  background:var(--card);border-radius:20px;
  padding:1.2rem 1.3rem;margin-bottom:1rem;
  border:1px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.dna-title{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;color:var(--tx);
  margin-bottom:3px;
}
.dna-subtitle{font-size:11px;color:var(--tx2);margin-bottom:12px;line-height:1.6}
.dna-radar-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.dna-pillar-scores{flex:1;min-width:160px;display:flex;flex-direction:column;gap:10px}
.dna-pillar-item{display:flex;flex-direction:column;gap:4px}
.dna-pillar-header{display:flex;align-items:center;justify-content:space-between}
.dna-pillar-name{font-size:12px;font-weight:600;color:var(--tx);letter-spacing:.2px}
.dna-pillar-val{font-size:12px;font-weight:700}
.dna-pillar-bar{height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.dna-pillar-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.dna-pillar-desc{font-size:10px;color:var(--tx2);line-height:1.4}
.dna-print-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;
  background:rgba(255,255,255,.04);
  color:var(--tx2);border:1px solid var(--border);
  border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;font-weight:600;
  cursor:pointer;margin-top:12px;
  transition:all .2s;width:100%;
  -webkit-tap-highlight-color:transparent;
}
.dna-print-btn:hover{border-color:var(--vital);color:var(--vital);background:rgba(0,214,143,.05)}

/* ── HYDRATION WIDGET ── */
.agua-widget{
  background:linear-gradient(135deg,#0A1A2E,#0C1F3A);
  border-radius:20px;padding:1.2rem;margin-bottom:1rem;
  border:1px solid rgba(96,165,250,.15);
}
.agua-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.agua-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff}
.agua-meta{font-size:11px;color:rgba(96,165,250,.7);letter-spacing:.3px}
.agua-progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:12px}
.agua-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#1D4ED8,var(--sky));transition:width .5s ease;box-shadow:0 0 10px rgba(96,165,250,.3)}
.agua-copos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.copo{
  width:46px;height:54px;cursor:pointer;border-radius:12px;
  border:1px solid rgba(96,165,250,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:all .2s;background:rgba(255,255,255,.03);flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.copo.cheio{border-color:var(--sky);background:rgba(96,165,250,.12);box-shadow:0 0 12px rgba(96,165,250,.2)}
.copo-icon{font-size:22px;opacity:.25;transition:all .2s}
.copo.cheio .copo-icon{opacity:1}
.copo-ml{font-size:8px;color:rgba(96,165,250,.5);font-weight:600}
.copo.cheio .copo-ml{color:var(--sky)}
.agua-status{font-size:12px;color:var(--tx2);text-align:center;padding:8px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border)}
.agua-status.ok{background:rgba(0,214,143,.08);color:var(--vital);border-color:rgba(0,214,143,.2);font-weight:600}
.agua-status.warn{background:rgba(255,159,67,.08);color:var(--amber);border-color:rgba(255,159,67,.2)}
.agua-streak{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--tx2)}

/* ── SUPPLEMENT CHECK ── */
.supp-check-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:1.1rem 1.3rem;margin-bottom:1rem;
}
.supp-check-title{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;color:var(--tx);margin-bottom:8px;
}
.supp-check-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.supp-check-item:last-child{border-bottom:none}
.supp-check-box{
  width:30px;height:30px;
  border:1.5px solid var(--border);
  border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;flex-shrink:0;
  background:rgba(255,255,255,.03);
  -webkit-tap-highlight-color:transparent;
}
.supp-check-box.checked{border-color:var(--vital);background:rgba(0,214,143,.12);color:var(--vital)}
.supp-check-name{font-size:13px;font-weight:500;color:var(--tx)}
.supp-check-time{font-size:11px;color:var(--tx2);margin-top:2px}
.supp-check-streak{font-size:11px;color:var(--gold);font-weight:600}

/* ── EVOLUTION CARD ── */
.evolution-card{
  background:linear-gradient(135deg,#0A1F14,#0C2618);
  border-radius:20px;padding:1.2rem;margin-bottom:1rem;
  border:1px solid rgba(0,214,143,.1);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.evo-title{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;color:#fff;
  margin-bottom:6px;display:flex;align-items:center;gap:8px;
}
.evo-days{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.evo-day{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;cursor:pointer;
  transition:all .2s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.evo-day.done{background:rgba(0,214,143,.2);color:var(--vital);border:1px solid rgba(0,214,143,.3)}
.evo-day.today{background:var(--vital);color:#fff;box-shadow:0 0 12px rgba(0,214,143,.4)}
.evo-day.future{background:rgba(255,255,255,.04);color:var(--tx3);border:1px solid var(--border)}
.evo-day.milestone{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3)}
.checkin-prompt{background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin-top:10px;border:1px solid var(--border)}
.checkin-q{font-size:13px;color:var(--tx);margin-bottom:10px;line-height:1.5}
.checkin-opts{display:flex;gap:6px;flex-wrap:wrap}

.cidade-uf{
  background:rgba(0,214,143,.12);color:var(--vital);
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;
  border:1px solid rgba(0,214,143,.25);
}

/* ── LOADING ── */
.ldg{text-align:center;padding:4rem 1rem;background:var(--card);border-radius:20px;margin:1rem;border:1px solid var(--border)}
.ldg-logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--tx);margin-bottom:1.5rem}
.ldg-logo span{background:linear-gradient(135deg,var(--vital),var(--pulse));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ldg-ring{
  width:60px;height:60px;
  border:3px solid rgba(0,214,143,.1);
  border-top:3px solid var(--vital);
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 1.5rem;
  box-shadow:0 0 20px rgba(0,214,143,.2);
}
@keyframes spin{to{transform:rotate(360deg)}}
.ldg-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-bottom:14px;color:var(--tx)}
.ldg-step{font-size:12px;color:var(--tx3);padding:4px 0;transition:color .3s;letter-spacing:.3px}
.ldg-step.on{color:var(--vital);font-weight:600}

/* ── MISC ── */
.soldiers-link{background:rgba(245,200,66,.08)!important;color:var(--gold)!important;border-color:rgba(245,200,66,.25)!important}
.finput-hint{font-size:11px;color:var(--tx3);margin-top:4px;font-style:italic}

@media(max-width:520px){
  .frow{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .opts.c2,.opts.c3{grid-template-columns:1fr}
  .prod-grid{grid-template-columns:repeat(2,1fr)}
  .srch-grid{grid-template-columns:1fr 1fr}
  .card{margin:0 .5rem 1rem;padding:1.2rem}
  .prog-wrap{margin:0 .5rem 1rem}
  .res-h2{margin:2rem .5rem 1rem}
  .supp-card{margin:0 .5rem 1.5rem}
}


/* ══ DR. CÉREBRO METABÓLICO ══ */
.oraculo-wrap{
  background:#111F16;
  border-radius:22px;padding:1.5rem;margin-bottom:1rem;
  border:1px solid rgba(96,165,250,.3);
  position:relative;overflow:hidden;
}
.oraculo-wrap::before{
  content:'';position:absolute;
  top:-80px;right:-80px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(96,165,250,.08),transparent 70%);
  border-radius:50%;
}
.oraculo-wrap::after{
  content:'';position:absolute;
  bottom:-60px;left:-60px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(167,139,250,.06),transparent 70%);
  border-radius:50%;
}
.oraculo-header{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.oraculo-icon{
  width:52px;height:52px;border-radius:16px;flex-shrink:0;
  background:linear-gradient(135deg,#1D4ED8,#7C3AED);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 4px 20px rgba(96,165,250,.25);
}
.oraculo-title{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;color:#fff;line-height:1.2;
}
.oraculo-sub{font-size:12px;color:#A8C4B0;margin-top:3px;line-height:1.5}
.oraculo-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(96,165,250,.1);color:var(--sky);
  border:1px solid rgba(96,165,250,.25);
  border-radius:20px;padding:4px 12px;
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:14px;
}
.oraculo-input-wrap{position:relative;margin-bottom:12px}
.oraculo-textarea{
  width:100%;min-height:90px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(96,165,250,.2);
  border-radius:14px;
  padding:14px 16px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;color:#F0F4F1;
  outline:none;resize:none;
  transition:all .25s;
  line-height:1.6;
}
.oraculo-textarea:focus{
  border-color:rgba(96,165,250,.5);
  background:rgba(96,165,250,.04);
  box-shadow:0 0 0 3px rgba(96,165,250,.08);
}
.oraculo-textarea::placeholder{color:rgba(122,148,133,.5)}
.oraculo-examples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.oraculo-ex{
  padding:6px 12px;border-radius:20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  font-size:11px;color:#8AAD99;cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.oraculo-ex:hover{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.2);color:var(--sky)}
.btn-oraculo{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#1D4ED8,#7C3AED);
  border:none;border-radius:14px;
  font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;
  cursor:pointer;transition:all .3s;
  box-shadow:0 6px 24px rgba(96,165,250,.3),0 1px 0 rgba(255,255,255,.1) inset;
  display:flex;align-items:center;justify-content:center;gap:10px;
  -webkit-tap-highlight-color:transparent;
}
.btn-oraculo:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(96,165,250,.4)}
.btn-oraculo:disabled{opacity:.5;transform:none;cursor:not-allowed}
.oraculo-loading{
  display:none;text-align:center;padding:2rem 1rem;
}
.oraculo-loading.show{display:block}
.oraculo-dots{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.oraculo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--sky);animation:dot-pulse 1.4s ease-in-out infinite;
}
.oraculo-dot:nth-child(2){animation-delay:.2s}
.oraculo-dot:nth-child(3){animation-delay:.4s}
@keyframes dot-pulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.oraculo-loading-txt{font-size:13px;color:rgba(96,165,250,.7);font-style:italic;letter-spacing:.5px}
.oraculo-result{
  display:none;margin-top:16px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(96,165,250,.15);
  border-radius:16px;overflow:hidden;
}
.oraculo-result.show{display:block}
.oraculo-result-header{
  background:linear-gradient(135deg,rgba(29,78,216,.2),rgba(124,58,237,.2));
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(96,165,250,.1);
}
.oraculo-result-title{
  font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fff;
}
.oraculo-result-body{
  padding:16px;font-size:13px;color:#C8DDD4;line-height:1.85;
}
.oraculo-result-body strong{color:#fff;font-weight:600}
.oraculo-result-body em{color:var(--sky);font-style:normal}
.oraculo-result-body h4{
  font-family:'Playfair Display',serif;font-size:14px;
  color:var(--sky);margin:14px 0 6px;
}
.oraculo-urgency{
  margin:12px 16px 16px;
  padding:10px 14px;border-radius:10px;
  font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:8px;
}
.oraculo-urgency.alta{background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.2)}
.oraculo-urgency.media{background:rgba(255,159,67,.1);color:var(--amber);border:1px solid rgba(255,159,67,.2)}
.oraculo-urgency.baixa{background:rgba(0,214,143,.1);color:var(--vital);border:1px solid rgba(0,214,143,.2)}
.oraculo-novo{
  margin:0 16px 16px;
  padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  font-size:12px;color:#7A9485;text-align:center;cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.oraculo-novo:hover{border-color:rgba(96,165,250,.3);color:var(--sky)}
.oraculo-disclaimer{
  margin:0 16px 16px;font-size:10px;color:#3D5A47;
  line-height:1.6;text-align:center;letter-spacing:.2px;
}


/* ══ ORÁCULO PAYWALL ══ */
.oraculo-free-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,214,143,.1);color:var(--vital);
  border:1px solid rgba(0,214,143,.25);
  border-radius:20px;padding:4px 12px;
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:6px;
}
.oraculo-uses-info{
  font-size:12px;color:#A8C4B0;
  margin-bottom:14px;line-height:1.5;
}
.oraculo-uses-info strong{color:#fff}
.oraculo-paywall{
  margin-top:16px;
  background:linear-gradient(135deg,rgba(29,78,216,.15),rgba(124,58,237,.15));
  border:1px solid rgba(96,165,250,.2);
  border-radius:16px;padding:1.2rem;
  text-align:center;
}
.oraculo-paywall-icon{font-size:36px;margin-bottom:8px;display:block}
.oraculo-paywall-title{
  font-size:17px;font-weight:700;color:#fff;
  margin-bottom:6px;
}
.oraculo-paywall-sub{font-size:12px;color:rgba(96,165,250,.7);line-height:1.6;margin-bottom:16px}
.oraculo-price-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;margin-bottom:14px;
  background:rgba(255,255,255,.05);
  border-radius:12px;padding:12px 16px;
  border:1px solid rgba(255,255,255,.08);
}
.oraculo-price-single{text-align:center}
.oraculo-price-label{font-size:10px;color:rgba(96,165,250,.6);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.oraculo-price-val{font-size:24px;font-weight:800;color:var(--sky)}
.oraculo-price-div{width:1px;height:40px;background:rgba(255,255,255,.1)}
.oraculo-pix-wrap{
  background:rgba(255,255,255,.04);border-radius:12px;
  padding:12px;margin-bottom:12px;
  border:1px solid rgba(255,255,255,.08);
}
.oraculo-pix-key{
  font-family:monospace;font-size:13px;color:var(--sky);
  background:rgba(96,165,250,.08);padding:8px 16px;
  border-radius:10px;display:inline-block;
  cursor:pointer;border:1px solid rgba(96,165,250,.3);
  transition:all .2s;margin:6px 0;
}
.oraculo-pix-key:hover{background:rgba(96,165,250,.15)}
.oraculo-pix-hint{font-size:10px;color:rgba(96,165,250,.5);letter-spacing:.3px}
.oraculo-code-wrap{margin-top:10px}
.oraculo-code-input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(96,165,250,.2);
  border-radius:12px;font-size:14px;
  color:#fff;outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  text-align:center;letter-spacing:2px;
  margin-bottom:8px;
  -webkit-appearance:none;
}
.oraculo-code-input:focus{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.06)}
.oraculo-code-input::placeholder{color:rgba(96,165,250,.3);letter-spacing:0}
.btn-oraculo-unlock{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#1D4ED8,#7C3AED);
  border:none;border-radius:12px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:700;color:#fff;
  cursor:pointer;transition:all .25s;
  box-shadow:0 4px 20px rgba(96,165,250,.3);
  -webkit-tap-highlight-color:transparent;
}
.btn-oraculo-unlock:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(96,165,250,.4)}
.oraculo-counter{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  margin-bottom:14px;
}
.oraculo-counter.free{background:rgba(0,214,143,.1);color:var(--vital);border:1px solid rgba(0,214,143,.2)}
.oraculo-counter.used{background:rgba(255,107,107,.12);color:#FF8A8A;border:1px solid rgba(255,107,107,.3);font-weight:700}


/* ══ ORÁCULO PREMIUM ══ */
.oraculo-tier-wrap{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:14px;
}
.oraculo-tier{
  border-radius:14px;padding:14px;cursor:pointer;
  border:2px solid transparent;transition:all .25s;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.oraculo-tier.basic{
  background:rgba(96,165,250,.06);
  border-color:rgba(96,165,250,.2);
}
.oraculo-tier.basic:hover{border-color:rgba(96,165,250,.5);background:rgba(96,165,250,.1)}
.oraculo-tier.premium{
  background:linear-gradient(135deg,rgba(245,200,66,.06),rgba(255,159,67,.06));
  border-color:rgba(245,200,66,.3);
}
.oraculo-tier.premium:hover{border-color:rgba(245,200,66,.6);background:linear-gradient(135deg,rgba(245,200,66,.12),rgba(255,159,67,.1))}
.oraculo-tier.selected-basic{border-color:var(--sky)!important;background:rgba(96,165,250,.15)!important;box-shadow:0 0 16px rgba(96,165,250,.2)}
.oraculo-tier.selected-premium{border-color:var(--gold)!important;background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(255,159,67,.12))!important;box-shadow:0 0 16px rgba(245,200,66,.2)}
.oraculo-tier-badge{
  position:absolute;top:8px;right:8px;
  background:var(--gold);color:#000;
  font-size:8px;font-weight:800;
  padding:2px 7px;border-radius:10px;letter-spacing:.5px;
}
.oraculo-tier-icon{font-size:22px;margin-bottom:6px;display:block}
.oraculo-tier-name{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.oraculo-tier-price{font-size:20px;font-weight:800;color:var(--sky);line-height:1}
.oraculo-tier.premium .oraculo-tier-price{color:var(--gold)}
.oraculo-tier-desc{font-size:10px;color:rgba(255,255,255,.5);margin-top:4px;line-height:1.4}
.oraculo-tier-features{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.oraculo-tier-feat{font-size:10px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:4px}
.oraculo-tier-feat::before{content:"✓";color:var(--sky);font-weight:700;font-size:10px}
.oraculo-tier.premium .oraculo-tier-feat::before{color:var(--gold)}

/* Formula result card */
.oraculo-formula-card{

.oraculo-formula-header{

.oraculo-formula-title{

.oraculo-posologia{

.oraculo-farmacia-note{

.oraculo-print-formula{

  color:var(--gold);cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.oraculo-print-formula:hover{background:rgba(245,200,66,.18)}


/* ══ CHECK DE TREINO ══ */
.treino-card{
  background:linear-gradient(135deg,#0A1F14,#0C2618);
  border-radius:20px;padding:1.2rem;margin-bottom:1rem;
  border:1px solid rgba(0,214,143,.1);
}
.treino-title{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;color:#fff;margin-bottom:8px;
}
.treino-item{

.treino-item:last-child{border-bottom:none}

.treino-info{flex:1}

.treino-desc{font-size:11px;color:var(--tx2);margin-top:2px}
.treino-streak{font-size:11px;color:var(--gold);font-weight:600;margin-top:2px}
.treino-motivacional{

  background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;
  border-left:2px solid var(--vital);
  font-size:12px;color:#C8DDD4;line-height:1.7;font-style:italic;
}
.treino-motivacional strong{color:var(--vital);font-style:normal}


/* ══ SUPLEMENTAI — JORNADA 30 DIAS ══ */
.sai-wrap{
  background:linear-gradient(145deg,#0A1F14,#0C2618);
  border-radius:22px;overflow:hidden;margin-bottom:1rem;
  border:1px solid rgba(0,214,143,.2);
  box-shadow:0 12px 40px rgba(0,0,0,.4);
  position:relative;
}
.sai-wrap::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--vital),var(--pulse),var(--gold));
}
.sai-header{padding:1.5rem 1.5rem 1rem;position:relative}
.sai-logo-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.sai-logo{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,var(--vital),#009966);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,214,143,.3);
}
.sai-brand{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:800;color:#fff;
  letter-spacing:-.5px;
}
.sai-brand span{
  background:linear-gradient(135deg,var(--vital),var(--pulse));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.sai-tagline{font-size:12px;color:#7A9485;margin-top:2px;letter-spacing:.3px}
.sai-desc{
  font-size:13px;color:#A8C4B0;line-height:1.75;
  margin-bottom:16px;
}
.sai-features{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.sai-feat{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;
  background:rgba(255,255,255,.04);
  border-radius:12px;border:1px solid rgba(255,255,255,.07);
}
.sai-feat-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.sai-feat-text{flex:1}
.sai-feat-title{font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.sai-feat-desc{font-size:11px;color:#5A7A6A;margin-top:1px;line-height:1.4}

/* Planos */

.sai-plan-periodo{font-size:10px;color:#5A7A6A;margin-bottom:8px}
.sai-plan-economia{font-size:10px;color:var(--vital);font-weight:700;background:rgba(0,214,143,.1);padding:2px 8px;border-radius:10px;display:inline-block}

.sai-pix-wrap{

/* ===== SCORE ===== */
function calcScore(a){
  var gut=0,sleep=0,hor=0;
  // INTESTINO (0-100)
  if(a.i1==="1x ao dia")gut+=20;else if(a.i1==="2x ou mais ao dia")gut+=25;else if(a.i1==="Irregular, varia muito")gut+=8;
  if(a.i2==="Bem formadas e macias")gut+=20;else if(a.i2==="Pastosas ou moles")gut+=10;else if(a.i2==="Ressecadas e difíceis")gut+=5;
  var sy=[].concat(a.i3||[]);if(sy.indexOf("Nenhum desses")>=0)gut+=25;else gut+=Math.max(0,25-sy.length*6);
  if(["Bem saudável e regrada","Vegetariana/vegana"].indexOf(a.i4)>=0)gut+=20;else if(a.i4==="Equilibrada, mas com deslizes")gut+=12;
  if(["1,5 a 2,5L","Mais de 2,5L"].indexOf(a.i6)>=0)gut+=15;else if(a.i6==="1 a 1,5L")gut+=8;
  // SONO (0-100)
  if(a.s1==="7 a 9h")sleep+=35;else if(a.s1==="6 a 7h")sleep+=20;else if(a.s1==="5 a 6h")sleep+=8;
  if(a.s2==="Ótimo — durmo como uma pedra")sleep+=30;else if(a.s2==="Bom — acordo bem")sleep+=20;else if(a.s2==="Razoável — pouca energia")sleep+=8;
  var si=[].concat(a.s3||[]);if(si.indexOf("Nenhum")>=0)sleep+=20;else sleep+=Math.max(0,20-si.length*5);
  if(a.s5==="Boa e estável")sleep+=15;else if(a.s5==="Bom de manhã, cai à tarde")sleep+=8;
  // HORMÔNIOS (0-100)
  if(a.h3==="Raramente me estresso")hor+=25;else if(a.h3==="Estresse leve e controlável")hor+=18;else if(a.h3==="Estresse moderado")hor+=10;
  if(a.h1==="Bem e positivo(a)")hor+=20;else if(a.h1==="Relativamente estável")hor+=12;
  if(a.h7==="5 ou mais vezes/semana")hor+=25;else if(a.h7==="3 a 4x por semana")hor+=20;else if(a.h7==="1 a 2x por semana")hor+=10;
  if(a.h8==="Foco e memória excelentes")hor+=15;else if(a.h8==="Razoavelmente focado(a)")hor+=10;
  if(a.h4==="Peso estável")hor+=15;else if(a.h4==="Dificuldade para emagrecer")hor+=5;
  gut=Math.min(100,gut);sleep=Math.min(100,sleep);hor=Math.min(100,hor);
  return{total:Math.round((gut+sleep+hor)/3),gut:gut,sleep:sleep,hor:hor};
}

function scoreGrade(n){
  if(n>=80)return{label:"Excelente ✨",color:"#1D9E75",bg:"rgba(29,158,117,.15)"};
  if(n>=60)return{label:"Bom 👍",color:"#0F6E56",bg:"rgba(15,110,86,.15)"};
  if(n>=40)return{label:"Regular ⚡",color:"#EF9F27",bg:"rgba(239,159,39,.15)"};
  return{label:"Crítico 🚨",color:"#E24B4A",bg:"rgba(226,75,74,.15)"};
}

/* ===== MANDALA DOS PILARES — substitui DNA ===== */
function renderDNA(a, sc) {
  var gut=sc.gut, sleep=sc.sleep, hor=sc.hor;
  var imc_v = a.peso&&a.altura ? (parseFloat(a.peso)/Math.pow(parseFloat(a.altura)/100,2)) : 24;
  var goodW = ["1,5 a 2,5L","Mais de 2,5L"].indexOf(a.i6)>=0;
  var agua = goodW ? 85 : a.i6==="1 a 1,5L" ? 55 : 30;
  var act = ["3 a 4x por semana","5 ou mais vezes/semana"].indexOf(a.h7)>=0 ? 90 :
            a.h7==="1 a 2x por semana" ? 50 : 20;
  var energy = a.s5==="Bom e só reduz quando vou dormir"?90:
               a.s5==="Bom pela manhã e pior à tarde"?60:
               a.s5==="Irregular, sobe e desce"?40:20;

  var sectors=[
    {label:"Intestino", val:gut/100,    color:"#F59E0B"},
    {label:"Hidratação",val:agua/100,   color:"#60A5FA"},
    {label:"Sono",      val:sleep/100,  color:"#A78BFA"},
    {label:"Energia",   val:energy/100, color:"#F87171"},
    {label:"Hormônios", val:hor/100,    color:"#34D399"},
    {label:"Exercício", val:act/100,    color:"#4DFFC4"}
  ];

  var cx=110, cy=110, total=6;
  var sliceAngle=360/total;
  var rings=[0.25,0.5,0.75,1.0];

  function polarToXY(cx,cy,r,angle){
    var rad=(angle-90)*Math.PI/180;
    return {x:cx+r*Math.cos(rad), y:cy+r*Math.sin(rad)};
  }

  var svgParts=[];

  // Dark background
  svgParts.push('<rect width="220" height="220" rx="0" fill="transparent"/>');

  // Grid rings
  rings.forEach(function(f){
    var pts=[];
    for(var i=0;i<total;i++){
      var p=polarToXY(cx,cy,80*f,i*sliceAngle);
      pts.push(p.x+','+p.y);
    }
    svgParts.push('<polygon points="'+pts.join(' ')+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="'+(f===1?1:0.5)+'"/>');
  });

  // Axis lines
  for(var i=0;i<total;i++){
    var p=polarToXY(cx,cy,80,i*sliceAngle);
    svgParts.push('<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>');
  }

  // Sector fills with gradient effect
  sectors.forEach(function(s,i){
    var startA=i*sliceAngle-1;
    var endA=(i+1)*sliceAngle+1;
    var r=80*s.val;
    if(r<2) r=2;
    var p1=polarToXY(cx,cy,r,startA);
    var p2=polarToXY(cx,cy,r,endA);
    var large=endA-startA>180?1:0;
    // Fill sector
    svgParts.push('<path d="M'+cx+','+cy+' L'+p1.x+','+p1.y+' A'+r+','+r+' 0 '+large+',1 '+p2.x+','+p2.y+' Z" fill="'+s.color+'" opacity="'+(0.12+s.val*0.45)+'"/>');
    // Sector border/stroke
    var pOut1=polarToXY(cx,cy,80*s.val,startA+1);
    var pOut2=polarToXY(cx,cy,80*s.val,endA-1);
    svgParts.push('<path d="M'+cx+','+cy+' L'+pOut1.x+','+pOut1.y+' A'+(80*s.val)+','+(80*s.val)+' 0 '+large+',1 '+pOut2.x+','+pOut2.y+' Z" fill="none" stroke="'+s.color+'" stroke-width="1.5" opacity="0.6"/>');
    // Dot at tip
    var mid=i*sliceAngle+sliceAngle/2;
    var dp=polarToXY(cx,cy,80*s.val,mid);
    svgParts.push('<circle cx="'+dp.x+'" cy="'+dp.y+'" r="4" fill="'+s.color+'" stroke="#060E09" stroke-width="1.5"/>');
  });

  // Outer reference ring
  var outerPts=[];
  for(var i=0;i<total;i++){
    var p=polarToXY(cx,cy,80,i*sliceAngle);
    outerPts.push(p.x+','+p.y);
  }
  svgParts.push('<polygon points="'+outerPts.join(' ')+'" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="3,3"/>');

  // Center circle with score
  svgParts.push('<circle cx="'+cx+'" cy="'+cy+'" r="26" fill="#060E09"/>');
  svgParts.push('<circle cx="'+cx+'" cy="'+cy+'" r="26" fill="none" stroke="rgba(0,214,143,0.3)" stroke-width="1"/>');
  svgParts.push('<text x="'+cx+'" y="'+(cy-5)+'" text-anchor="middle" font-size="20" font-weight="700" fill="#fff" font-family="Playfair Display,serif">'+sc.total+'</text>');
  svgParts.push('<text x="'+cx+'" y="'+(cy+9)+'" text-anchor="middle" font-size="7" fill="#00D68F" font-family="Plus Jakarta Sans,sans-serif" letter-spacing="1.5" font-weight="600">SCORE</text>');

  // Color legend rows (2 columns, below SVG)
  var legendHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:10px">';
  sectors.forEach(function(s){
    var pct=Math.round(s.val*100);
    var status=pct>=75?'Ótimo':pct>=50?'Bom':pct>=25?'Regular':'Baixo';
    legendHTML+='<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06)">'+
      '<div style="width:10px;height:10px;border-radius:3px;background:'+s.color+';flex-shrink:0;box-shadow:0 0 6px '+s.color+'44"></div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:11px;font-weight:600;color:#F0F4F1;line-height:1.2">'+s.label+'</div>'+
        '<div style="font-size:10px;color:'+s.color+';font-weight:700;margin-top:1px">'+pct+'% · '+status+'</div>'+
      '</div>'+
    '</div>';
  });
  legendHTML+='</div>';

function metaAgua(peso){return Math.round(parseFloat(peso||70)*35/250)*250;}

function renderAgua(peso){
  var meta=metaAgua(peso);
  var hoje=new Date().toDateString();
  var data=lsGet("agua_"+hoje)||{ml:0,copos:[]};
  var totalCopos=Math.ceil(meta/250);
  var coposBebidos=Math.floor(data.ml/250);
  var pct=Math.min(100,Math.round(data.ml/meta*100));
  var streak=lsGet("agua_streak")||0;

  var coposHTML='';
  for(var i=0;i<totalCopos;i++){
    var cheio=i<coposBebidos;
    coposHTML+='<div class="copo '+(cheio?'cheio':'')+'" data-copo="'+i+'"><span class="copo-icon">💧</span><span class="copo-ml">250ml</span></div>';
  }

  var statusMsg=pct>=100?'🎉 Meta atingida! Parabéns, '+a2nome+'!':pct>=75?'Ótimo ritmo! Mais '+(meta-data.ml)+'ml para atingir a meta.':pct>=50?'Na metade do caminho. Continue!':'Beba água agora — seu metabolismo depende disso.';
  var statusCls=pct>=100?'ok':pct>=50?'':' warn';

  return ['<div class="agua-widget">',
    '<div class="agua-header">',
      '<div class="agua-title">💧 Hidratação de Hoje</div>',
      '<div class="agua-meta">Meta: '+meta+'ml · '+data.ml+'ml bebidos ('+pct+'%)</div>',
    '</div>',
    '<div class="agua-progress-bar"><div class="agua-fill" style="width:'+pct+'%"></div></div>',
    '<div class="agua-copos" id="agua-copos">'+coposHTML+'</div>',
    '<div class="agua-status'+statusCls+'" id="agua-status">'+statusMsg+'</div>',
    streak>0?'<div class="agua-streak"><span class="streak-fire">🔥</span> '+streak+' dia'+(streak>1?'s':'')+' seguido'+(streak>1?'s':'')+' hidratando no nível certo!</div>':'',
  '</div>'].join('');
}

function renderEvolucao(nome){
  var inicio=lsGet("inicio_data");
  if(!inicio){inicio=new Date().toISOString();lsSet("inicio_data",inicio);}
  var dias=Math.floor((new Date()-new Date(inicio))/(1000*60*60*24));
  var checkins_resp=lsGet("checkins")||{};

  var diasHTML='';
  for(var d=1;d<=30;d++){
    var c=CHECKINS.filter(function(ci){return ci.dia===d;})[0];
    var done=d<=dias;
    var isMilestone=c!==undefined;
    var isToday=d===dias+1;
    diasHTML+='<div class="evo-day '+(done?"done":isToday?"today":"future")+(isMilestone?" milestone":"")+(isToday?" milestone":"")+'" title="Dia '+d+'">'+(isMilestone?c.emoji:(done?"✓":d))+'</div>';
  }

  // Checkin pendente?
  var checkinHTML='';
  var pendente=CHECKINS.filter(function(ci){return ci.dia<=dias&&!checkins_resp["d"+ci.dia];})[0];
  if(pendente){
    checkinHTML=['<div class="checkin-prompt">',
      '<div class="checkin-q">'+pendente.emoji+' <strong>Check-in do dia '+pendente.dia+'</strong><br>'+pendente.q+'</div>',
      '<div class="checkin-opts">'+pendente.opts.map(function(o){
        return '<button class="checkin-opt" data-dia="'+pendente.dia+'" data-resp="'+o+'">'+o+'</button>';
      }).join('')+'</div>',
    '</div>'].join('');
  }

  // Medalhas
  var medalhas=[
    {id:"d1",icon:"🌅",label:"Começou",done:dias>=0},
    {id:"d7",icon:"🌱",label:"7 dias",done:dias>=7},
    {id:"d14",icon:"⚡",label:"2 semanas",done:dias>=14},
    {id:"d21",icon:"🔥",label:"21 dias",done:dias>=21},
    {id:"d30",icon:"🏆",label:"30 dias",done:dias>=30}
  ];
  var medalhasHTML=medalhas.map(function(m){
    return '<div class="medalha '+(m.done?"":"locked")+'"><span class="medalha-icon">'+m.icon+'</span><span class="medalha-label">'+m.label+'</span></div>';
  }).join('');

  return ['<div class="evolution-card">',
    '<div class="evo-title">📈 Sua Jornada de 30 Dias</div>',
    '<div style="font-size:12px;color:#9FE1CB;margin-bottom:8px">Dia '+dias+' de 30 · '+nome+', cada dia conta.</div>',
    '<div class="evo-days">'+diasHTML+'</div>',
    checkinHTML,
    '<div class="medalha-row">'+medalhasHTML+'</div>',
  '</div>'].join('');
}

  var names=["Cadastro","Intestino","Sono","Hormônios","Perfil Bio","Revisão"];
  var s=S.step;
  var prog='<div class="prog-wrap"><div class="prog-bars">'+STEPS.map(function(_,i){return '<div class="prog-bar '+(i<s?"done":i===s?"active":"")+'"></div>';}).join('')+'</div><div class="prog-lbl">Etapa '+(s+1)+' de '+STEPS.length+' &middot; <strong>'+names[s]+'</strong></div></div>';

  if(s===0)wrap.innerHTML=rCad();
  else if(s===1)wrap.innerHTML=rQ("intestino","🦠 Pilar 1 — Intestino & Digestão","h-gut","01");
  else if(s===2)wrap.innerHTML=rQ("sono","🌙 Pilar 2 — Sono & Recuperação","h-sleep","02");

  root.innerHTML=prog;root.appendChild(wrap);bind();
}

function bindResult(){
  // ÁGUA
  document.querySelectorAll(".copo").forEach(function(copo){
    copo.addEventListener("click",function(){
      var idx=parseInt(copo.dataset.copo);
      var hoje=new Date().toDateString();
      var data=lsGet("agua_"+hoje)||{ml:0};
      var novoCopo=idx+1;
      data.ml=novoCopo*250;
      lsSet("agua_"+hoje,data);
      // Atualiza streak
      var ontem=new Date();ontem.setDate(ontem.getDate()-1);
      var dataOntem=lsGet("agua_"+ontem.toDateString());
      var meta=metaAgua(S.ans.peso);
      var streak=lsGet("agua_streak")||0;
      if(data.ml>=meta){
        if(dataOntem&&dataOntem.ml>=meta)streak++;else streak=1;
        lsSet("agua_streak",streak);
      }
      // Re-render água
      var widget=document.getElementById("agua-widget-wrap");
      if(widget)widget.innerHTML=renderAgua(S.ans.peso);
      else render(); // fallback
      setTimeout(bindResult,50);
    });
  });
  // CHECK SUPLEMENTOS
  // TREINO CHECK — single toggle
  var treinoBox = document.getElementById("treino-hoje-box");
  if(treinoBox){
    treinoBox.addEventListener("click", function(){
      var hoje = new Date().toDateString();
      var treinou = !(lsGet("treino_" + hoje) || false);
      lsSet("treino_" + hoje, treinou);
      if(treinou){
        var ontem = new Date(); ontem.setDate(ontem.getDate()-1);
        var yoTreinou = lsGet("treino_" + ontem.toDateString()) || false;
        var streak = lsGet("treino_streak") || 0;
        lsSet("treino_streak", yoTreinou ? streak+1 : 1);
      }
      treinoBox.className = "treino-box" + (treinou ? " checked" : "");
      treinoBox.textContent = treinou ? "✓" : "";
      var nomeEl = treinoBox.parentElement.querySelector(".treino-nome");
      var descEl = treinoBox.parentElement.querySelector(".treino-desc");
      if(nomeEl) nomeEl.textContent = treinou ? "✅ Treinei hoje!" : "Treinei hoje?";
      if(descEl) descEl.textContent = treinou ? "Parabéns! Continue amanhã." : "Marque ao completar seu treino do dia.";
    });
  }

  document.querySelectorAll(".supp-check-box").forEach(function(box){
    box.addEventListener("click",function(){
      var k=box.dataset.supp;
      var hoje=new Date().toDateString();
      var checks=lsGet("supp_check_"+hoje)||{};
      checks[k]=!checks[k];
      lsSet("supp_check_"+hoje,checks);
      if(checks[k]){
        var ontem=new Date();ontem.setDate(ontem.getDate()-1);
        var yo=lsGet("supp_check_"+ontem.toDateString())||{};
        var streak=lsGet("supp_streak_"+k)||0;
        lsSet("supp_streak_"+k,yo[k]?streak+1:1);
      }
      box.className="supp-check-box"+(checks[k]?" checked":"");
      box.textContent=checks[k]?"✓":"";
    });
  });
  // CHECK-IN EMOCIONAL
  document.querySelectorAll(".checkin-opt").forEach(function(opt){
    opt.addEventListener("click",function(){
      var dia=opt.dataset.dia,resp=opt.dataset.resp;
      var cr=lsGet("checkins")||{};cr["d"+dia]={resp:resp,data:new Date().toISOString()};
      lsSet("checkins",cr);
      opt.classList.add("sel");

  if (!inp) return;
  var code = inp.value.trim().toUpperCase();
  // Códigos de desbloqueio: gerado por hash do nome+data ou código fixo de teste
  var nome = S.ans.nome || "";
  var validCodes = ["BIOCODEX2025", "MANUALANTIDOENCA"];
  // Código personalizado baseado nas 3 primeiras letras do nome + score
  var sc = calcScore(S.ans);
  var personalCode = "BX" + nome.substring(0,3).toUpperCase() + sc.total;
  validCodes.push(personalCode);

  if (validCodes.indexOf(code) >= 0) {
    lsSet("secret_unlocked", true);
    // Re-render result
    S.result = buildMap(S.ans, iMC(S.ans));
    render();
    setTimeout(activateImages, 80);
    setTimeout(bindResult, 120);

    inp.style.borderColor = "#E24B4A";
    inp.placeholder = "Código inválido. Verifique e tente novamente.";
    setTimeout(function(){ inp.style.borderColor=""; }, 2000);
  }
}

/* AUTOCOMPLETE LÓGICA */
function normalizeStr(s){
  return s.toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[^a-z0-9 ]/g,"");
}

function searchCidades(q){
  if(!q||q.length<2) return [];
  var qn=normalizeStr(q);
  var results=[];
  for(var i=0;i<CIDADES_BR.length;i++){
    var c=CIDADES_BR[i];
    if(normalizeStr(c[0]).indexOf(qn)===0) results.unshift(c); // starts with — prioritize
    else if(normalizeStr(c[0]).indexOf(qn)>=0) results.push(c);
    if(results.length>=8) break;
  }
  return results.slice(0,8);
}

var cidadeSelectedIdx=-1;

function initCidadeAutocomplete(){
  var input=document.getElementById("bcidade");
  var drop=document.getElementById("cidade-dropdown");
  if(!input||!drop) return;

  input.addEventListener("input",function(){
    cidadeSelectedIdx=-1;
    var q=input.value.trim();
    var results=searchCidades(q);
    if(!results.length){drop.className="cidade-dropdown";return;}
    drop.innerHTML=results.map(function(c,i){
      return '<div class="cidade-option" data-cidade="'+c[0]+'" data-uf="'+c[1]+'" data-idx="'+i+'">'+
        '<span class="cidade-nome">'+c[0]+'</span>'+
        '<span class="cidade-uf">'+c[1]+'</span>'+
      '</div>';
    }).join('');
    drop.className="cidade-dropdown show";
    // Click handler
    drop.querySelectorAll(".cidade-option").forEach(function(opt){
      opt.addEventListener("click",function(){
        selectCidade(opt.dataset.cidade, opt.dataset.uf);
      });
    });
  });

  input.addEventListener("keydown",function(e){
    var opts=drop.querySelectorAll(".cidade-option");
    if(!opts.length) return;
    if(e.key==="ArrowDown"){
      e.preventDefault();
      cidadeSelectedIdx=Math.min(cidadeSelectedIdx+1,opts.length-1);
    } else if(e.key==="ArrowUp"){
      e.preventDefault();
      cidadeSelectedIdx=Math.max(cidadeSelectedIdx-1,0);
    } else if(e.key==="Enter"&&cidadeSelectedIdx>=0){
      e.preventDefault();
      var sel=opts[cidadeSelectedIdx];
      selectCidade(sel.dataset.cidade, sel.dataset.uf);
      return;
    } else if(e.key==="Escape"){
      drop.className="cidade-dropdown";
      return;
    }
    opts.forEach(function(o,i){o.classList.toggle("focused",i===cidadeSelectedIdx);});
  });

  input.addEventListener("blur",function(){
    setTimeout(function(){drop.className="cidade-dropdown";},180);
  });
}

function selectCidade(nome, uf){
  var input=document.getElementById("bcidade");
  var drop=document.getElementById("cidade-dropdown");
  var est=document.getElementById("bestado");
  if(input) input.value=nome;
  if(drop) drop.className="cidade-dropdown";
  if(est) est.value=uf;
  // Save immediately
  S.ans.cidade=nome;
  S.ans.estado=uf;
}

function getMensagemHoje(crenca) {
  var tipo = crenca || "prefiro";
  var msgs = MENSAGENS[tipo] || MENSAGENS.prefiro;
  // Rotaciona por dia do ano para variar sempre
  var dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  return msgs[dayOfYear % msgs.length];
}

function setupTreinoNotificacao(crenca, turno) {
  if (!("Notification" in window)) return;
  Notification.requestPermission().then(function(perm) {
    if (perm !== "granted") return;
    // Hora baseada no turno
    var hora = turno === "noturno" ? 14 : turno === "tarde_noite" ? 12 : turno === "manha_tarde" ? 6 : 6;
    var msg = getMensagemHoje(crenca);
    var agora = new Date();
    var alvo = new Date();
    alvo.setHours(hora, 30, 0, 0);
    if (alvo <= agora) alvo.setDate(alvo.getDate() + 1);
    var delay = alvo - agora;
    setTimeout(function() {
      new Notification("💪 BioCodex — Hora de agir!", {
        body: msg,
        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>"
      });
    }, delay);
  });
}

function getSaiDiasRestantes(){
  var expiry = lsGet("sai_expiry");
  if(!expiry) return 0;
  var diff = new Date(expiry) - new Date();
  return Math.max(0, Math.ceil(diff / (1000*60*60*24)));

function getSaiDiaAtual(){
  var inicio = lsGet("sai_inicio");

function tryUnlockSai(){
  var inp = document.getElementById("sai-code");
  if(!inp) return;
  var code = inp.value.trim().toUpperCase();
  // Códigos: SAI30 = 30 dias, SAI90 = 90 dias, SAI180 = 180 dias
  var dias = 0;
  if(code.match(/^SAI30/)||code==="SUPLEMENTAI2025") dias=30;
  else if(code.match(/^SAI90/)) dias=90;
  else if(code.match(/^SAI180/)) dias=180;

  if(dias>0){
    var inicio = new Date();
    var expiry = new Date(inicio.getTime() + dias*24*60*60*1000);
    lsSet("sai_inicio", inicio.toISOString());
    lsSet("sai_expiry", expiry.toISOString());
    lsSet("sai_plano", _saiPlanoSel);
    // Dar 1 consulta grátis Dr. Cérebro
    var extra = lsGet("oraculo_extra_unlocked")||[];
    extra.push("SAI_BONUS_"+Date.now());
    lsSet("oraculo_extra_unlocked", extra);
    // Re-render
    S.result = buildMap(S.ans, iMC(S.ans));
    render();
    setTimeout(activateImages,80);
    setTimeout(bindResult,120);
    setTimeout(function(){
      var el=document.querySelector(".sai-wrap");
      if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    },300);
  } else {
    inp.style.borderColor="#FF6B6B";
    inp.placeholder="Código inválido. Tente novamente.";
    setTimeout(function(){inp.style.borderColor="";inp.placeholder="Cole o código recebido (ex: SAI30-1234)";},2500);
  }
}

function bindSai(){
  // Rotina item clicks
  document.querySelectorAll(".sai-rotina-item").forEach(function(item){
    item.addEventListener("click",function(){
      var key = item.dataset.saiKey;
      var hoje = new Date().toDateString();
      var checks = lsGet("sai_rotina_"+hoje)||{};

      // Water and treino handled specially
      if(key==="agua"){
        var widget=document.getElementById("agua-widget-wrap");
        if(widget) widget.scrollIntoView({behavior:"smooth"});
        return;
      }
      if(key==="treino"){
        var treinou = !(lsGet("treino_"+hoje)||false);
        lsSet("treino_"+hoje, treinou);
        // Update visuals
        item.classList.toggle("done", treinou);
        var check=item.querySelector(".sai-rotina-check");
        if(check) check.textContent = treinou?"✓":"";
        var titulo=item.querySelector(".sai-rotina-titulo");
        if(titulo) titulo.textContent = (treinou?"🏋️ Treino concluído hoje! 🎉":"🏋️ Treino do dia");
        updateSaiProgress();
        return;
      }

      // Supplement check
      checks[key] = !checks[key];
      lsSet("sai_rotina_"+hoje, checks);
      item.classList.toggle("done", checks[key]);
      var check2=item.querySelector(".sai-rotina-check");
      if(check2) check2.textContent = checks[key]?"✓":"";
      updateSaiProgress();
    });
  });
}

function updateSaiProgress(){
  var items = document.querySelectorAll(".sai-rotina-item");
  var total = items.length;
  var done = document.querySelectorAll(".sai-rotina-item.done").length;
  var pct = total>0?Math.round(done/total*100):0;
  var pctEl = document.querySelector(".sai-prog-pct");
  var fillEl = document.querySelector(".sai-prog-fill");
  if(pctEl) pctEl.textContent = done+"/"+total+" · "+pct+"%";
  if(fillEl) fillEl.style.width = pct+"%";
}

function resetApp(){
  try { lsSet("biocodex_state", null); } catch(e){}
  S.step=0;S.ans={};S.result=null;S.loading=false;S.pontoCego="SONO";S.suppKeys=[];a2nome="";
  // Limpa desbloqueios para nova avaliacao comecar bloqueada
  try{
    localStorage.removeItem("bx_secret_unlocked");
    localStorage.removeItem("bx_specific_unlocked");
  }catch(e){}
  render();window.scrollTo(0,0);
}
// Restaura estado salvo se voltou de link externo (Safari iOS)
try {
  var _saved = lsGet("biocodex_state");
  if(_saved && _saved.hasResult && _saved.ans && _saved.ans.nome){
    S.ans = _saved.ans;
    S.step = 99;
    S.pontoCego = _saved.pontoCego || 0;
    S.suppKeys = _saved.suppKeys || [];
    S.result = buildMap(S.ans, iMC(S.ans));
  }
} catch(e){}

render();

// Safari iOS — force all external links to new tab
document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a||!a.href||a.href.indexOf('http')<0)return;e.preventDefault();window.open(a.href,'_blank','noopener,noreferrer');},true);

</script>
